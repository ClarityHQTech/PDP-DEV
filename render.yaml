services:
  - type: web
    name: pdp-analyzer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: WEBSHARE_PROXY_USER
        sync: false
      - key: WEBSHARE_PROXY_PASS
        sync: false
      - key: DEV_AUTH_BYPASS
        value: false
      - key: APP_ENV
        value: production
